<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Profile</title><style>
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

.container{
padding:20px;
padding-bottom:120px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.dateRow{
display:flex;
gap:10px;
margin-top:15px;
}

.dateBtn{
flex:1;
padding:14px;
border-radius:40px;
border:2px solid #2e7d32;
text-align:center;
font-weight:bold;
color:#2e7d32;
}

.activeDate{
background:#2e7d32;
color:white;
}

.slots{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:20px;
}

.slot{
padding:16px;
border-radius:16px;
border:2px solid #2e7d32;
text-align:center;
font-weight:bold;
}

.slotSelected{
background:#2e7d32;
color:white;
}

.bottomBar{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -8px 20px rgba(0,0,0,0.1);
}

.bookBtn{
background:#2e7d32;
color:white;
padding:14px 26px;
border-radius:30px;
font-weight:bold;
}

#datePicker{
display:none;
}
</style></head><body><div class="container"><div class="card"><h2>Dr Mehta</h2>
<p>Cardiologist • ⭐ 4.7 • 12 yrs</p><h3>Select Date</h3><div class="dateRow"><div class="dateBtn activeDate" onclick="selectToday(this)">
Today
</div><div class="dateBtn" onclick="selectTomorrow(this)">
Tomorrow
</div><div class="dateBtn" onclick="openCalendar()">
📅 Pick Date
</div><input type="date" id="datePicker"></div><h3>Available Slots</h3><div id="slotsContainer" class="slots"></div></div></div><div class="bottomBar">
<div id="selectedText">No slot selected</div>
<div class="bookBtn" onclick="bookSlot()">Book Appointment</div>
</div><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script>

const firebaseConfig = {
apiKey:"PASTE",
authDomain:"PASTE",
projectId:"PASTE",
storageBucket:"PASTE",
messagingSenderId:"PASTE",
appId:"PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedSlot=null;
let selectedDate="Today";

function renderSlots(arr){
let c=document.getElementById("slotsContainer");
c.innerHTML="";

arr.forEach(t=>{
let d=document.createElement("div");
d.className="slot";
d.innerText=t;

d.onclick=function(){
document.querySelectorAll(".slot")
.forEach(s=>s.classList.remove("slotSelected"));

d.classList.add("slotSelected");

selectedSlot=t;

document.getElementById("selectedText").innerText=
selectedDate+" • "+t;
};

c.appendChild(d);
});
}

function selectToday(btn){
document.querySelectorAll(".dateBtn")
.forEach(b=>b.classList.remove("activeDate"));
btn.classList.add("activeDate");

selectedDate="Today";
renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"]);
}

function selectTomorrow(btn){
document.querySelectorAll(".dateBtn")
.forEach(b=>b.classList.remove("activeDate"));
btn.classList.add("activeDate");

selectedDate="Tomorrow";
renderSlots(["09:30 AM","11:00 AM","01:30 PM","03:00 PM"]);
}

function openCalendar(){
document.getElementById("datePicker").click();
}

document.getElementById("datePicker")
.addEventListener("change",function(){

selectedDate=this.value;

document.querySelectorAll(".dateBtn")
.forEach(b=>b.classList.remove("activeDate"));

renderSlots(["09:00 AM","11:00 AM","01:00 PM","03:30 PM"]);

document.getElementById("selectedText").innerText=
"Date: "+selectedDate;
});

function bookSlot(){

if(!selectedSlot){
alert("Select slot first");
return;
}

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot,
status:"booked"
})
.then(()=>{
alert("Appointment Booked Successfully");
window.location.href="history.html";
});

}

renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"]);

</script></body>
</html>
