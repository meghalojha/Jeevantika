<body onload="checkUser()">

</div>

<div class="stat">
<b>4.7 ⭐</b><br>
Rating
</div>

<div class="stat">
<b>2000+</b><br>
Patients
</div>

</div>

<div class="about">
<h3>About Doctor</h3>
<p>Experienced cardiologist specialized in heart diseases, preventive cardiology and patient wellness. Provides compassionate care and advanced treatment plans.</p>
</div>

<div class="about">
<h3>Select Slot</h3>

<div class="slots">

<div class="slot" onclick="selectSlot(this)">10:00 AM</div>
<div class="slot" onclick="selectSlot(this)">11:30 AM</div>
<div class="slot" onclick="selectSlot(this)">02:00 PM</div>
<div class="slot" onclick="selectSlot(this)">04:30 PM</div>
<div class="slot" onclick="selectSlot(this)">06:00 PM</div>

</div>

</div>

<div class="bookbar">
<button class="btn" style="width:100%" onclick="book()">Book Appointment</button>
</div>

<script>

let selectedTime="";

function selectSlot(el){

document.querySelectorAll(".slot").forEach(s=>s.classList.remove("active"));
el.classList.add("active");

selectedTime=el.innerText;

}

function book(){

if(selectedTime==""){
alert("Please select time slot");
return;
}

localStorage.setItem("appointmentTime",selectedTime);
alert("Appointment Booked Successfully");

location.href="history.html";

}

</script>

</body>
</html>
