<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Profile</title>

<style>
body { font-family: Arial; margin: 0; background: #f2f2f2; padding-bottom: 100px; }
.header { background: linear-gradient(90deg,#1b5e20,#43a047); color:white; padding:20px; font-size:22px;}
.card { background:white; margin:20px; padding:20px; border-radius:15px;}
.slot { padding:12px; border:2px solid #2e7d32; border-radius:12px; display:inline-block; margin:6px; cursor:pointer;}
.active { background:#2e7d32; color:white;}
.bookbar { position:fixed; bottom:0; left:0; right:0; background:white; padding:12px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 -2px 8px rgba(0,0,0,0.2);}
.btn { background:#2e7d32; color:white; padding:12px 20px; border:none; border-radius:25px; font-size:16px; cursor:pointer;}
#debug { background:black; color:#00ff00; padding:10px; margin:20px; font-size:11px; border-radius:8px;}
</style>
</head>

<body>

<div class="header">Dr Mehta</div>

<div class="card">
<h2>Select Slot</h2>
<div id="slots"></div>
</div>

<div id="debug">Logs Starting...</div>

<div class="bookbar">
<div id="info">No slot selected</div>
<button class="btn" onclick="bookNow()">Book Appointment</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

var debug = document.getElementById("debug");

window.onerror=function(m){
debug.innerHTML+="<br>JS Error → "+m;
}

// SLOT UI
var selectedSlot=null;
var slotList=["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"];
var container=document.getElementById("slots");
var info=document.getElementById("info");

slotList.forEach(function(time){

var div=document.createElement("div");
div.className="slot";
div.innerHTML=time;

div.onclick=function(){

document.querySelectorAll(".slot").forEach(function(s){
s.classList.remove("active");
});

div.classList.add("active");
selectedSlot=time;
info.innerHTML="Today • "+time;

}

container.appendChild(div);

});

// FIREBASE
var firebaseConfig={
apiKey:"AIzaSyBIEXLovtA6p7n0Qev6i4t7pnrGm1C9dsA",
authDomain:"jeevantika-6972.firebaseapp.com",
projectId:"jeevantika-6972",
storageBucket:"jeevantika-6972.appspot.com",
messagingSenderId:"61584268994",
appId:"1:61584268994:web:7c1dc303f82eeca9cce55b"
};

firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

debug.innerHTML+="<br>Firebase Ready";

// BOOK
function bookNow(){

if(!selectedSlot){
info.innerHTML="Select slot first";
info.style.color="red";
return;
}

var btn=document.querySelector(".btn");
btn.innerHTML="Booking...";
btn.disabled=true;

db.collection("appointments").add({
doctor:"Dr Mehta",
date:new Date().toLocaleDateString(),
time:selectedSlot,
status:"booked"
})
.then(function(doc){

debug.innerHTML+="<br>Booked ID → "+doc.id;

btn.innerHTML="Success";

setTimeout(function(){
window.location.href="history.html";
},1000);

})
.catch(function(err){

debug.innerHTML+="<br>Firebase Error → "+err.message;

btn.innerHTML="Retry";
btn.disabled=false;

});

}

</script>

</body>
</html>
