<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Profile Debug</title>
</head>

<body style="font-family:Arial;padding:20px">

<h2>Dr Mehta</h2>

<h3>Select Slot</h3>

<button onclick="selectSlot('10:00 AM')">10:00 AM</button>
<button onclick="selectSlot('10:30 AM')">10:30 AM</button>
<button onclick="selectSlot('11:00 AM')">11:00 AM</button>

<br><br>

<button onclick="bookNow()">Book Appointment</button>

<p id="status"></p>

<script>

let selectedSlot = null;

function selectSlot(time){
selectedSlot = time;
document.getElementById("status").innerText =
"Selected Slot: " + time;
}

function bookNow(){

alert("Button Click Working ✅");

if(!selectedSlot){
alert("Please select slot first");
return;
}

alert("Booking Slot: " + selectedSlot);

}

</script>

</body>
</html>
