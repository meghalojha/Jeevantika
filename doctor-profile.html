<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Doctor Profile</title><style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f8;
}

.container{
padding:20px;
}

.card{
background:white;
border-radius:25px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.title{
font-size:26px;
font-weight:bold;
}

.sub{
color:gray;
margin-top:5px;
}

.section{
margin-top:25px;
}

.dateRow{
display:flex;
gap:12px;
margin-top:12px;
}

.dateBtn{
flex:1;
padding:14px;
border-radius:40px;
border:2px solid #2e7d32;
text-align:center;
font-weight:bold;
color:#2e7d32;
}

.activeDate{
background:#2e7d32;
color:white;
}

.slots{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:15px;
}

.slot{
padding:14px;
border-radius:18px;
border:2px solid #2e7d32;
text-align:center;
font-weight:bold;
}

.selected{
background:#2e7d32;
color:white;
}

.disabled{
background:#e0e0e0;
border:none;
color:#888;
}

.bottomBar{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
box-shadow:0 -5px 15px rgba(0,0,0,0.08);
}

.bookBtn{
background:#2e7d32;
color:white;
padding:15px 25px;
border-radius:30px;
font-weight:bold;
}

</style></head><body><div class="container"><div class="card"><div class="title">Dr Mehta</div>
<div class="sub">Cardiologist • 12 Years Experience</div><div class="section">
<b>Select Appointment Date</b><div class="dateRow">
<div class="dateBtn activeDate" onclick="changeDate(this,'today')">Today</div>
<div class="dateBtn" onclick="changeDate(this,'tomorrow')">Tomorrow</div>
<div class="dateBtn" onclick="pickDate()">Pick</div>
</div></div><div class="section">
<b>Available Time Slots</b><div id="slots" class="slots"></div></div></div></div><div class="bottomBar">
<div id="selectedText">No slot selected</div>
<div class="bookBtn" onclick="book()">Book Appointment</div>
</div><script>

let selectedSlot = null;
let currentDate = "today";

const todaySlots = ["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM","04:30 PM","06:00 PM"];
const tomorrowSlots = ["09:30 AM","10:00 AM","01:00 PM","03:30 PM","05:00 PM"];

function renderSlots(list){
const box = document.getElementById("slots");
box.innerHTML="";
list.forEach(time=>{
const div=document.createElement("div");
div.className="slot";
div.innerText=time;
div.onclick=()=>{
document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"));
div.classList.add("selected");
selectedSlot=time;
document.getElementById("selectedText").innerText="Selected: "+time;
};
box.appendChild(div);
});
}

renderSlots(todaySlots);

function changeDate(el,type){

document.querySelectorAll(".dateBtn").forEach(b=>b.classList.remove("activeDate"));
el.classList.add("activeDate");

selectedSlot=null;
document.getElementById("selectedText").innerText="No slot selected";

if(type=="today"){
currentDate="today";
renderSlots(todaySlots);
}
else{
currentDate="tomorrow";
renderSlots(tomorrowSlots);
}

}

function pickDate(){
let d = prompt("Enter date (example 25 April)");
if(!d) return;

document.querySelectorAll(".dateBtn").forEach(b=>b.classList.remove("activeDate"));

selectedSlot=null;
document.getElementById("selectedText").innerText="Date: "+d;

renderSlots(["11:00 AM","01:30 PM","04:00 PM"]);
}

function book(){
if(!selectedSlot){
alert("Please select slot");
return;
}
alert("Appointment booked on "+currentDate+" at "+selectedSlot);
}

</script></body>
</html>
