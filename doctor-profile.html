<!DOCTYPE html><html>
<head>
<title>Doctor Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f7f6;
text-align:center;
}

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
padding:25px;
font-size:24px;
font-weight:bold;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.photo{
width:130px;
height:130px;
border-radius:50%;
background:#c8e6c9;
margin:25px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:55px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.name{
font-size:24px;
font-weight:bold;
}

.spec{
color:grey;
margin-top:6px;
}

.rating{
color:#ff9800;
margin-top:10px;
font-size:18px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:15px 22px;
border-radius:14px;
font-size:16px;
margin:10px;
width:80%;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.book{
background:#1565c0;
}

</style></head><body><div class="header">Doctor Profile</div><div class="photo">👨‍⚕</div><div class="card">
<div class="name">Dr. Mehta</div>
<div class="spec">Cardiologist • 12 Years Experience</div>
<div class="rating">⭐⭐⭐⭐ 4.5 Rating</div>
</div><button onclick="window.location.href='tel:9876543210'">
📞 Call Doctor
</button><button class="book" onclick="location.href='appointment.html'">
📅 Book Appointment
</button></body>
</html>
