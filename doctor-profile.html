<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Profile</title><style>

body{
margin:0;
font-family:system-ui;
background:#f2f4f7;
}

.container{
padding:20px;
padding-bottom:120px;
}

.card{
background:white;
border-radius:22px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{
margin-top:0;
}

.sub{
color:#777;
margin-bottom:10px;
}

/* DATE ROW */

.dateRow{
display:flex;
gap:10px;
margin-top:15px;
}

.dateBtn{
flex:1;
padding:14px;
border-radius:40px;
border:2px solid #2e7d32;
text-align:center;
font-weight:700;
color:#2e7d32;
background:white;
}

.activeDate{
background:#2e7d32;
color:white;
}

.calendarBtn{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
}

/* SLOT GRID */

.slots{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:20px;
}

.slot{
padding:16px;
border-radius:16px;
border:2px solid #2e7d32;
text-align:center;
font-weight:700;
background:white;
}

.slotSelected{
background:#2e7d32;
color:white;
}

/* BOTTOM BAR */

.bottomBar{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -8px 20px rgba(0,0,0,.1);
}

.bookBtn{
background:#2e7d32;
color:white;
padding:14px 26px;
border-radius:30px;
font-weight:700;
}

#calendarInput{
position:absolute;
opacity:0;
pointer-events:none;
}

</style></head><body><div class="container"><div class="card"><h2>Dr Mehta</h2>
<div class="sub">Cardiologist • ⭐ 4.7 • 12 yrs</div><h3>Select Appointment Date</h3><div class="dateRow"><div class="dateBtn activeDate" onclick="changeDate(this,'today')">
Today
</div><div class="dateBtn" onclick="changeDate(this,'tomorrow')">
Tomorrow
</div><div class="dateBtn calendarBtn" onclick="openCalendar()">
📅 Pick Date
</div><input type="date" id="calendarInput"></div><h3>Available Time Slots</h3><div id="slotsContainer" class="slots"></div></div></div><div class="bottomBar">
<div id="selectedText">No slot selected</div>
<div class="bookBtn" onclick="bookSlot()">Book Appointment</div>
</div><script>

let selectedSlot = null
let selectedDate = "Today"

/* SLOT RENDER */

function renderSlots(arr){

let container = document.getElementById("slotsContainer")
container.innerHTML=""

arr.forEach(time=>{

let div=document.createElement("div")
div.className="slot"
div.innerText=time

div.onclick=function(){

document.querySelectorAll(".slot")
.forEach(s=>s.classList.remove("slotSelected"))

div.classList.add("slotSelected")

selectedSlot=time

document.getElementById("selectedText").innerText =
selectedDate+" • "+time

}

container.appendChild(div)

})

}

/* DATE SWITCH */

function changeDate(btn,type){

document.querySelectorAll(".dateBtn")
.forEach(b=>b.classList.remove("activeDate"))

btn.classList.add("activeDate")

selectedSlot=null

if(type==="today"){
selectedDate="Today"
renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM","04:30 PM","06:00 PM"])
}

if(type==="tomorrow"){
selectedDate="Tomorrow"
renderSlots(["09:30 AM","11:00 AM","01:30 PM","03:00 PM","05:30 PM"])
}

document.getElementById("selectedText").innerText="No slot selected"

}

/* CALENDAR BUTTON */

function openCalendar(){
document.getElementById("calendarInput").showPicker();
}

document.getElementById("calendarInput").addEventListener("change",function(){

selectedDate=this.value

document.querySelectorAll(".dateBtn")
.forEach(b=>b.classList.remove("activeDate"))

selectedSlot=null

renderSlots(["09:00 AM","11:00 AM","01:00 PM","03:30 PM","05:00 PM"])

document.getElementById("selectedText").innerText =
"Date: "+selectedDate

})

/* BOOK */

function bookSlot(){

if(!selectedSlot){
alert("Please select slot")
return
}

alert("Appointment booked on "+selectedDate+" at "+selectedSlot)

}

/* INITIAL LOAD */

renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM","04:30 PM","06:00 PM"])

</script></body>
</html>
