<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Profile</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
padding-bottom:90px;
}

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
padding:15px;
color:white;
font-size:20px;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:20px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.dateRow{
display:flex;
gap:10px;
margin-top:10px;
}

.dateBtn{
flex:1;
border:2px solid #2e7d32;
padding:12px;
border-radius:25px;
text-align:center;
}

.active{
background:#2e7d32;
color:white;
}

.slots{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.slot{
border:2px solid #2e7d32;
padding:12px;
border-radius:15px;
text-align:center;
}

.selected{
background:#2e7d32;
color:white;
}

.bookBar{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
box-shadow:0 -4px 15px rgba(0,0,0,0.1);
}

.bookBtn{
background:#2e7d32;
color:white;
padding:12px 25px;
border-radius:25px;
}

</style>
</head>

<body>

<div class="header">Dr Mehta</div>

<div class="card">

<h3>Select Appointment Date</h3>

<div class="dateRow">
<div class="dateBtn active" id="todayBtn" onclick="today()">Today</div>
<div class="dateBtn" id="tomBtn" onclick="tomorrow()">Tomorrow</div>
<div class="dateBtn" onclick="openCal()">📅 Pick Date</div>
</div>

<input type="date" id="picker" style="display:none">

<h3>Available Time Slots</h3>

<div class="slots" id="slots"></div>

</div>

<div class="bookBar">
<div id="status">No slot selected</div>
<div class="bookBtn" onclick="book()">Book Appointment</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

var firebaseConfig = {
apiKey:"PASTE",
authDomain:"PASTE",
projectId:"PASTE"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let selectedSlot=null;
let selectedDate="Today";

function render(arr){
let box=document.getElementById("slots");
box.innerHTML="";
arr.forEach(t=>{
let d=document.createElement("div");
d.className="slot";
d.innerText=t;
d.onclick=function(){
document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"));
d.classList.add("selected");
selectedSlot=t;
document.getElementById("status").innerText=selectedDate+" • "+t;
};
box.appendChild(d);
});
}

function today(){
selectedDate="Today";
document.getElementById("todayBtn").classList.add("active");
document.getElementById("tomBtn").classList.remove("active");
render(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"]);
}

function tomorrow(){
selectedDate="Tomorrow";
document.getElementById("tomBtn").classList.add("active");
document.getElementById("todayBtn").classList.remove("active");
render(["09:30 AM","11:00 AM","01:30 PM","03:00 PM"]);
}

function openCal(){
document.getElementById("picker").click();
}

document.getElementById("picker").addEventListener("change",function(){
selectedDate=this.value;
render(["09:00 AM","11:00 AM","01:00 PM","03:30 PM"]);
document.getElementById("status").innerText="Date: "+selectedDate;
});

function book(){
if(!selectedSlot){
alert("Select Slot");
return;
}

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot
}).then(()=>{
alert("Booked Successfully");
window.location.href="history.html";
});
}

today();

</script>

</body>
</html>
