<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Profile</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
padding-bottom:100px;
}

.header{
background:linear-gradient(90deg,#1b5e20,#43a047);
color:white;
padding:20px;
font-size:22px;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
}

.slot{
padding:12px;
border:2px solid #2e7d32;
border-radius:12px;
display:inline-block;
margin:6px;
cursor:pointer;
}

.active{
background:#2e7d32;
color:white;
}

.bookbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -2px 8px rgba(0,0,0,0.2);
}

.btn{
background:#2e7d32;
color:white;
padding:12px 20px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

#daySelector{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.dayBtn{
padding:12px 18px;
border:2px solid #2e7d32;
border-radius:30px;
cursor:pointer;
font-size:14px;
}

.activeDay{
background:#2e7d32;
color:white;
}
</style>
</head>

<body>

<div class="header">Dr Mehta</div>

<div class="card">
<h2>Select Appointment Date</h2>

<div id="daySelector">

<div class="dayBtn activeDay" onclick="selectToday(this)">Today</div>

<div class="dayBtn" onclick="selectTomorrow(this)">Tomorrow</div>

<div class="dayBtn">
<label for="datePicker" style="cursor:pointer;">Pick Date 📅</label>
<input type="date" id="datePicker" style="display:none;">
</div>

</div>
</div>

<div class="card">
<h2>Select Slot</h2>
<div id="slots"></div>
</div>

<div class="bookbar">
<div id="info">No slot selected</div>
<button class="btn" onclick="bookNow()">Book Appointment</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// ---------------- DATE SYSTEM ----------------
var selectedDate="Today";

function clearActiveDay(){
document.querySelectorAll(".dayBtn").forEach(function(btn){
btn.classList.remove("activeDay");
});
}

function selectToday(el){
clearActiveDay();
el.classList.add("activeDay");
selectedDate="Today";
}

function selectTomorrow(el){
clearActiveDay();
el.classList.add("activeDay");

var d=new Date();
d.setDate(d.getDate()+1);
selectedDate=d.toISOString().split('T')[0];
}

document.getElementById("datePicker").addEventListener("change",function(){
clearActiveDay();
selectedDate=this.value;
});


// ---------------- SLOT SYSTEM ----------------
var selectedSlot=null;

var slotList=[
"10:00 AM",
"10:30 AM",
"11:30 AM",
"12:00 PM",
"02:00 PM"
];

var container=document.getElementById("slots");
var infoBar=document.getElementById("info");

slotList.forEach(function(time){

var div=document.createElement("div");
div.innerHTML=time;
div.className="slot";

div.onclick=function(){

document.querySelectorAll(".slot").forEach(function(s){
s.classList.remove("active");
});

div.classList.add("active");
selectedSlot=time;

infoBar.innerHTML=selectedDate+" • "+selectedSlot;

};

container.appendChild(div);

});


// ---------------- FIREBASE ----------------
var firebaseConfig={
apiKey:"AIzaSyBIEXLovtA6p7n0Qev6i4t7pnrGm1C9dsA",
authDomain:"jeevantika-6972.firebaseapp.com",
projectId:"jeevantika-6972",
storageBucket:"jeevantika-6972.appspot.com",
messagingSenderId:"61584268994",
appId:"1:61584268994:web:7c1dc303f82eeca9cce55b"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.firestore();

// 🔥 VERY IMPORTANT MOBILE FIX
db.settings({experimentalForceLongPolling:true});


// ---------------- BOOKING ----------------
function bookNow(){

if(!selectedSlot){
infoBar.innerHTML="Please select slot";
infoBar.style.color="red";
return;
}

var btn=document.querySelector(".btn");
btn.innerHTML="Booking...";
btn.disabled=true;

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot,
status:"booked",
created:Date.now()
})
.then(function(){

btn.innerHTML="Success";

setTimeout(function(){
window.location.href="history.html";
},1000);

})
.catch(function(error){

btn.innerHTML="Retry";
btn.disabled=false;
alert(error.message);

});

}

</script>

</body>
</html>
