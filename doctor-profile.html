<!DOCTYPE html><html>
<head>
<title>Doctor Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f7f6;
text-align:center;
}

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
padding:25px;
font-size:24px;
}

.photo{
width:120px;
height:120px;
border-radius:50%;
background:#c8e6c9;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
}

.card{
background:white;
margin:15px;
padding:18px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button{
background:#2e7d32;
color:white;
border:none;
padding:14px 20px;
border-radius:12px;
font-size:16px;
margin-top:15px;
}
</style></head><body><div class="header">Doctor Profile</div><div class="photo">👨‍⚕</div><div class="card">

<p>Cardiologist</p>

<p>⭐⭐⭐⭐ 4.5 Rating</p>
</div><button onclick="window.location.href='tel:9876543210'">Call Doctor</button>

</body>
</html>
