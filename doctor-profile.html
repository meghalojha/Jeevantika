<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Doctor Profile</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

.container{
padding:20px;
padding-bottom:120px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

h2{
margin-top:0;
}

.dateRow{
display:flex;
gap:10px;
margin-top:15px;
}

.dateBtn{
flex:1;
padding:14px;
border-radius:40px;
border:2px solid #2e7d32;
text-align:center;
font-weight:bold;
color:#2e7d32;
}

.activeDate{
background:#2e7d32;
color:white;
}

#calendar{
flex:1;
padding:14px;
border-radius:40px;
border:2px solid #2e7d32;
font-weight:bold;
color:#2e7d32;
}

.slots{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:20px;
}

.slot{
padding:16px;
border-radius:18px;
border:2px solid #2e7d32;
text-align:center;
font-weight:bold;
}

.slotSelected{
background:#2e7d32;
color:white;
}

.bottomBar{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

.bookBtn{
background:#2e7d32;
color:white;
padding:14px 25px;
border-radius:30px;
font-weight:bold;
}

</style></head><body><div class="container"><div class="card"><h2>Dr Mehta</h2>
<p>Cardiologist • 12 Years Experience</p><h3>Select Appointment Date</h3><div class="dateRow">
<div class="dateBtn activeDate" onclick="changeDate(this,'today')">Today</div>
<div class="dateBtn" onclick="changeDate(this,'tomorrow')">Tomorrow</div>
<input type="date" id="calendar">
</div><h3>Available Time Slots</h3><div id="slotsContainer" class="slots"></div></div></div><div class="bottomBar">
<div id="selectedText">No slot selected</div>
<div class="bookBtn" onclick="bookSlot()">Book Appointment</div>
</div><script>

let selectedSlot = null
let selectedDate = "Today"

function renderSlots(arr){

let container = document.getElementById("slotsContainer")
container.innerHTML = ""

arr.forEach(time=>{
let div = document.createElement("div")
div.className = "slot"
div.innerText = time

div.onclick = function(){

document.querySelectorAll(".slot").forEach(s=>s.classList.remove("slotSelected"))
div.classList.add("slotSelected")

selectedSlot = time

document.getElementById("selectedText").innerText =
selectedDate + " • " + time

}

container.appendChild(div)

})

}

function changeDate(btn,type){

document.querySelectorAll(".dateBtn").forEach(b=>b.classList.remove("activeDate"))
btn.classList.add("activeDate")

selectedSlot = null

if(type==="today"){
selectedDate = "Today"
renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM","04:30 PM","06:00 PM"])
}

if(type==="tomorrow"){
selectedDate = "Tomorrow"
renderSlots(["09:30 AM","11:00 AM","01:30 PM","03:00 PM","05:30 PM"])
}

document.getElementById("selectedText").innerText = "No slot selected"

}

document.getElementById("calendar").addEventListener("change", function(){

selectedDate = this.value

document.querySelectorAll(".dateBtn").forEach(b=>b.classList.remove("activeDate"))

selectedSlot = null

renderSlots(["09:00 AM","11:00 AM","01:00 PM","03:30 PM","05:00 PM"])

document.getElementById("selectedText").innerText =
"Date: " + selectedDate

})

function bookSlot(){

if(!selectedSlot){
alert("Please select slot")
return
}

alert("Appointment Booked on " + selectedDate + " at " + selectedSlot)

}

renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM","04:30 PM","06:00 PM"])

</script></body>
</html>
