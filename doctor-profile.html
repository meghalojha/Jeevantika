<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

var firebaseConfig = {
apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let selectedSlot = null;
let selectedDate = "Today";

function selectSlot(time){
selectedSlot = time;

document.querySelectorAll(".slot").forEach(s=>{
s.classList.remove("activeSlot");
});

event.target.classList.add("activeSlot");

document.getElementById("selectedText").innerText =
selectedDate + " • " + time;
}

function selectToday(btn){
selectedDate="Today";
renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"]);
activateDate(btn);
}

function selectTomorrow(btn){
selectedDate="Tomorrow";
renderSlots(["09:30 AM","11:00 AM","01:30 PM","03:00 PM"]);
activateDate(btn);
}

function openCalendar(){
document.getElementById("datePicker").click();
}

document.getElementById("datePicker").addEventListener("change",function(){
selectedDate=this.value;
renderSlots(["09:00 AM","11:00 AM","01:00 PM","03:30 PM"]);
document.getElementById("selectedText").innerText="Date: "+selectedDate;
});

function activateDate(btn){
document.querySelectorAll(".dateBtn").forEach(b=>{
b.classList.remove("activeDate");
});
btn.classList.add("activeDate");
selectedSlot=null;
document.getElementById("selectedText").innerText="No slot selected";
}

function renderSlots(arr){
let c=document.getElementById("slotsContainer");
c.innerHTML="";
arr.forEach(t=>{
let d=document.createElement("div");
d.className="slot";
d.innerText=t;
d.onclick=function(){selectSlot(t)};
c.appendChild(d);
});
}

function bookNow(){

if(!selectedSlot){
alert("Please select time slot");
return;
}

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot,
status:"booked"
})
.then(function(){
alert("Appointment Booked Successfully ✅");
window.location.href="history.html";
})
.catch(function(error){
alert("Firebase Error → "+error.message);
});

}

renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"]);

</script><div class="header">Dr Mehta</div>

<div class="card">

<h3>Select Appointment Date</h3>

<div class="dateBtns">

<button class="dateBtn activeDate" onclick="selectToday(this)">Today</button>

<button class="dateBtn" onclick="selectTomorrow(this)">Tomorrow</button>

<button class="dateBtn" onclick="openCalendar()">📅 Pick Date</button>

<input type="date" id="datePicker" style="display:none">

</div>

<h3>Available Time Slots</h3>

<div class="slots" id="slotsContainer"></div>

</div>

<div class="bottomBar">
<div id="selectedText">No slot selected</div>
<button class="bookBtn" onclick="bookNow()">Book Appointment</button>
</div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

var firebaseConfig = {
apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();


let selectedSlot = null;
let selectedDate = "Today";

function renderSlots(arr){

let c = document.getElementById("slotsContainer");
c.innerHTML = "";

arr.forEach(function(t){

let d = document.createElement("div");
d.className="slot";
d.innerText = t;

d.onclick=function(){

document.querySelectorAll(".slot")
.forEach(function(s){s.classList.remove("slotSelected")});

d.classList.add("slotSelected");

selectedSlot = t;

document.getElementById("selectedText").innerText =
selectedDate + " • " + t;

}

c.appendChild(d);

});

}

function selectToday(btn){

document.querySelectorAll(".dateBtn")
.forEach(function(b){b.classList.remove("activeDate")});

btn.classList.add("activeDate");

selectedDate="Today";
selectedSlot=null;

document.getElementById("selectedText").innerText="No slot selected";

renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"]);

}

function selectTomorrow(btn){

document.querySelectorAll(".dateBtn")
.forEach(function(b){b.classList.remove("activeDate")});

btn.classList.add("activeDate");

selectedDate="Tomorrow";
selectedSlot=null;

document.getElementById("selectedText").innerText="No slot selected";

renderSlots(["09:30 AM","11:00 AM","01:30 PM","03:00 PM"]);

}

function openCalendar(){
document.getElementById("datePicker").click();
}

document.getElementById("datePicker").addEventListener("change",function(){

selectedDate=this.value;
selectedSlot=null;

document.querySelectorAll(".dateBtn")
.forEach(function(b){b.classList.remove("activeDate")});

document.getElementById("selectedText").innerText="Date: "+selectedDate;

renderSlots(["09:00 AM","11:00 AM","01:00 PM","03:30 PM"]);

});


function bookNow(){

if(!selectedSlot){
alert("Please select time slot");
return;
}

alert("Booking function triggered ✅");

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot,
status:"booked"
})
.then(function(){

alert("Appointment Saved In Firebase ✅");

window.location.href="history.html";

})
.catch(function(error){

alert("Firebase Error → "+error.message);

});

}


renderSlots(["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"]);

</script>

</body>
</html>
