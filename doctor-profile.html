<!DOCTYPE html>
<html>
<head>
<title>Doctor Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
padding:20px;
color:white;
font-size:20px;
font-weight:bold;
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:18px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.dateBtn{
border:2px solid #2e7d32;
padding:12px 18px;
border-radius:30px;
display:inline-block;
margin:6px;
font-weight:bold;
cursor:pointer;
}

.activeDate{
background:#2e7d32;
color:white;
}

.slot{
border:2px solid #2e7d32;
padding:14px;
border-radius:14px;
text-align:center;
margin:8px;
font-weight:bold;
cursor:pointer;
flex:1 0 30%;
}

.slotSelected{
background:#2e7d32;
color:white;
}

.slots{
display:flex;
flex-wrap:wrap;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -4px 10px rgba(0,0,0,0.1);
}

.bookBtn{
background:#2e7d32;
color:white;
border:none;
padding:14px 22px;
border-radius:30px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">Dr Mehta</div>

<div class="card">

<h3>Select Appointment Date</h3>

<div>
<span class="dateBtn activeDate" onclick="selectToday(this)">Today</span>
<span class="dateBtn" onclick="selectTomorrow(this)">Tomorrow</span>
<span class="dateBtn" onclick="openCalendar()">📅 Pick Date</span>
<input type="date" id="calendar" style="display:none">
</div>

<h3>Available Time Slots</h3>

<div class="slots" id="slots"></div>

</div>

<div class="bottom">
<div id="statusText">No slot selected</div>
<button class="bookBtn" onclick="book()">Book Appointment</button>
</div>

<script>

var firebaseConfig = {
apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var selectedSlot = null;
var selectedDate = "Today";

function renderSlots(arr){
var container = document.getElementById("slots");
container.innerHTML = "";

arr.forEach(function(time){
var div = document.createElement("div");
div.className = "slot";
div.innerText = time;

div.onclick = function(){
document.querySelectorAll(".slot").forEach(function(s){
s.classList.remove("slotSelected");
});
div.classList.add("slotSelected");

selectedSlot = time;
document.getElementById("statusText").innerText =
selectedDate + " • " + time;
};

container.appendChild(div);
});
}

function selectToday(btn){
document.querySelectorAll(".dateBtn").forEach(function(b){
b.classList.remove("activeDate");
});
btn.classList.add("activeDate");

selectedDate = "Today";
selectedSlot = null;
document.getElementById("statusText").innerText="No slot selected";

renderSlots([
"10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM","04:30 PM"
]);
}

function selectTomorrow(btn){
document.querySelectorAll(".dateBtn").forEach(function(b){
b.classList.remove("activeDate");
});
btn.classList.add("activeDate");

selectedDate = "Tomorrow";
selectedSlot = null;
document.getElementById("statusText").innerText="No slot selected";

renderSlots([
"09:30 AM","11:00 AM","01:30 PM","03:00 PM"
]);
}

function openCalendar(){
document.getElementById("calendar").click();
}

document.getElementById("calendar").addEventListener("change",function(){
selectedDate = this.value;

document.querySelectorAll(".dateBtn").forEach(function(b){
b.classList.remove("activeDate");
});

selectedSlot = null;
document.getElementById("statusText").innerText="No slot selected";

renderSlots([
"09:00 AM","11:00 AM","01:00 PM","03:30 PM"
]);
});

function book(){

if(selectedSlot == null){
alert("Please select slot");
return;
}

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot,
created:new Date().toISOString()
})
.then(function(){
alert("Appointment Booked");
window.location.href="history.html";
})
.catch(function(e){
alert("Error: "+e.message);
});

}

renderSlots([
"10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM","04:30 PM"
]);

</script>

</body>
</html>
