// ⭐ SAFE BOOKING FUNCTION
function bookNow(){

if(!selectedSlot){
infoBar.innerHTML="Please select slot";
infoBar.style.color="red";
return;
}

var btn=document.querySelector(".btn");
btn.innerHTML="Booking...";
btn.disabled=true;

// ⭐ Safety timeout (UI will never freeze)
var finished=false;

setTimeout(function(){
if(!finished){
btn.innerHTML="Booked (Offline Sync)";
window.location.href="history.html";
}
},5000);

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot,
status:"booked",
created:Date.now()
})
.then(function(){

finished=true;
btn.innerHTML="Success";

setTimeout(function(){
window.location.href="history.html";
},800);

})
.catch(function(e){

finished=true;
btn.innerHTML="Retry";
btn.disabled=false;
alert("Error → "+e.message);

});
