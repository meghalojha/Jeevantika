<!DOCTYPE html>
<html>
<head>
<title>Doctor Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#0f0f0f;
color:white;
}

.header{
background:linear-gradient(90deg,#0f9d58,#0b7a43);
padding:25px;
font-size:26px;
font-weight:bold;
}

.card{
background:#1c1c1c;
margin:20px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.slot{
border:2px solid #0f9d58;
padding:14px;
border-radius:14px;
display:inline-block;
margin:8px;
cursor:pointer;
font-weight:bold;
}

.activeSlot{
background:#0f9d58;
color:white;
}

.bottomBar{
position:fixed;
bottom:0;
width:100%;
background:#1c1c1c;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -5px 20px rgba(0,0,0,0.6);
}

.bookBtn{
background:#0f9d58;
border:none;
padding:15px 25px;
border-radius:30px;
color:white;
font-size:16px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
Dr Mehta
</div>

<div class="card">

<h2>Select Slot</h2>

<div class="slot" onclick="selectSlot(this,'10:00 AM')">10:00 AM</div>
<div class="slot" onclick="selectSlot(this,'10:30 AM')">10:30 AM</div>
<div class="slot" onclick="selectSlot(this,'11:30 AM')">11:30 AM</div>
<div class="slot" onclick="selectSlot(this,'12:00 PM')">12:00 PM</div>
<div class="slot" onclick="selectSlot(this,'02:00 PM')">02:00 PM</div>

</div>

<div class="bottomBar">
<div id="summary">No slot selected</div>
<button id="bookBtn" class="bookBtn" onclick="bookNow()">Book Appointment</button>
</div>


<!-- FIREBASE CDN -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBIEXLovtA6p7n0Qev6i4t7pnrGm1C9dsA",
    authDomain: "jeevantika-6972.firebaseapp.com",
    projectId: "jeevantika-6972",
    storageBucket: "jeevantika-6972.appspot.com",
    messagingSenderId: "61584268994",
    appId: "1:61584268994:web:7c1dc303f82eeca9cce55b
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

var selectedSlot = "";
var selectedDate = "Today";

function selectSlot(el,time){

selectedSlot = time;

document.querySelectorAll(".slot").forEach(function(btn){
btn.classList.remove("activeSlot");
});

el.classList.add("activeSlot");

document.getElementById("summary").innerHTML =
selectedDate + " • " + selectedSlot;

}

function bookNow(){

if(selectedSlot == ""){
alert("Please select slot");
return;
}

document.getElementById("bookBtn").innerHTML = "Booking...";
document.getElementById("bookBtn").disabled = true;

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot,
status:"booked",
createdAt: new Date()
})
.then(function(){

alert("✅ Appointment Booked");

document.getElementById("bookBtn").innerHTML = "Booked";

setTimeout(function(){
window.location.href = "history.html";
},1000);

})
.catch(function(error){

alert("❌ Firebase Error → " + error.message);

document.getElementById("bookBtn").innerHTML = "Book Appointment";
document.getElementById("bookBtn").disabled = false;

});

}

</script>

</body>
</html>
