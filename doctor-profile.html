<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Appointment</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

.header{
background:linear-gradient(90deg,#2e7d32,#66bb6a);
color:white;
padding:18px;
font-size:20px;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.slot{
border:2px solid #2e7d32;
padding:12px;
border-radius:10px;
margin:8px;
display:inline-block;
cursor:pointer;
}

.active{
background:#2e7d32;
color:white;
}

.bookBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:12px;
box-shadow:0 -5px 15px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

.bookBtn{
background:#2e7d32;
color:white;
border:none;
padding:14px 25px;
border-radius:30px;
font-size:16px;
}
</style>

</head>

<body>

<div class="header">Dr Mehta</div>

<div class="card">
<h3>Select Slot</h3>

<div class="slot" onclick="pick(this,'10:00 AM')">10:00 AM</div>
<div class="slot" onclick="pick(this,'10:30 AM')">10:30 AM</div>
<div class="slot" onclick="pick(this,'11:30 AM')">11:30 AM</div>
<div class="slot" onclick="pick(this,'12:00 PM')">12:00 PM</div>
<div class="slot" onclick="pick(this,'02:00 PM')">02:00 PM</div>

</div>

<div class="bookBar">
<div id="info">No slot selected</div>
<button class="bookBtn" onclick="book()">Book Appointment</button>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

var firebaseConfig = {
apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let selectedSlot = null;

function pick(el,time){

document.querySelectorAll(".slot").forEach(s=>{
s.classList.remove("active");
});

el.classList.add("active");

selectedSlot = time;

document.getElementById("info").innerText =
"Today • " + time;
}

function book(){

if(!selectedSlot){
alert("Please select slot");
return;
}

db.collection("appointments").add({
doctor:"Dr Mehta",
date:new Date().toLocaleDateString(),
time:selectedSlot,
status:"booked"
})
.then(()=>{
alert("Appointment Booked ✅");
window.location.href="history.html";
})
.catch(e=>{
alert(e.message);
});

}

</script>

</body>
</html>
