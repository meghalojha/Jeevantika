<!DOCTYPE html>
<html>
<head>
<title>Doctor Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
background:#f3f4f6;
margin:0;
}

.header{
background:linear-gradient(90deg,#2e7d32,#4caf50);
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.slot{
border:2px solid #2e7d32;
padding:12px;
border-radius:12px;
margin:6px;
display:inline-block;
cursor:pointer;
}

.slot.active{
background:#2e7d32;
color:white;
}

.bookBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bookBtn{
background:#2e7d32;
color:white;
border:none;
padding:14px 20px;
border-radius:25px;
font-size:16px;
}
</style>
</head>

<body>

<div class="header">Dr Mehta</div>

<div class="card">
<h3>Select Slot</h3>

<div id="slots"></div>

</div>

<div class="bookBar">
<div id="selectedText">No slot selected</div>
<button class="bookBtn" onclick="bookNow()">Book Appointment</button>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

var firebaseConfig = {
apiKey: "PUT YOUR KEY",
authDomain: "PUT",
projectId: "PUT",
storageBucket: "PUT",
messagingSenderId: "PUT",
appId: "PUT"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let selectedSlot = null;
let selectedDate = "Today";

function renderSlots(){

let arr = ["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"];

let container = document.getElementById("slots");
container.innerHTML="";

arr.forEach(function(time){

let div = document.createElement("div");
div.className="slot";
div.innerText=time;

div.onclick=function(){

document.querySelectorAll(".slot")
.forEach(function(s){ s.classList.remove("active") });

div.classList.add("active");

selectedSlot = time;

document.getElementById("selectedText")
.innerText = selectedDate + " • " + time;

};

container.appendChild(div);

});

}

renderSlots();

function bookNow(){

if(!selectedSlot){
alert("Please select slot");
return;
}

alert("Booking Click Working ✅");

db.collection("appointments").add({
doctor:"Dr Mehta",
date:selectedDate,
time:selectedSlot,
status:"booked"
})
.then(function(){

alert("Appointment Saved ✅");

window.location.href="history.html";

})
.catch(function(error){

alert("Firebase Error → " + error.message);

});

}

</script>

</body>
</html>
