<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeevantika</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
padding-bottom:80px;
}

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
padding:25px 15px 50px;
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.search{
background:white;
padding:12px;
border-radius:30px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.search input{
border:none;
outline:none;
width:100%;
font-size:16px;
}

.categories{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
}

.cat{
background:white;
padding:10px 18px;
border-radius:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
white-space:nowrap;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:20px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.doctorRow{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.bookBtn{
background:#2e7d32;
color:white;
padding:8px 15px;
border:none;
border-radius:10px;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -4px 15px rgba(0,0,0,0.1);
}

.fab{
position:fixed;
bottom:80px;
right:20px;
background:#e53935;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:24px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="header">
<h2>🌿 Jeevantika</h2>

<div class="search">
<input placeholder="Search doctors, medicines...">
</div>
</div>

<div class="categories">
<div class="cat" onclick="goDoctors()">Cardio</div>
<div class="cat" onclick="goDoctors()">Dental</div>
<div class="cat" onclick="goDoctors()">Skin</div>
<div class="cat" onclick="goDoctors()">General</div>
<div class="cat" onclick="goDoctors()">Ortho</div>
<div class="cat" onclick="goDoctors()">Neuro</div>
</div>

<div class="card">
<h3>⭐ Top Doctors Near You</h3>

<div class="doctorRow">
<div>
<b>Dr Mehta</b><br>
Cardiologist • ⭐ 4.7 • 12 yrs
</div>
<button class="bookBtn" onclick="openDoctor()">Book</button>
</div>

<hr>

<div class="doctorRow">
<div>
<b>Dr Shah</b><br>
Dentist • ⭐ 4.5 • 8 yrs
</div>
<button class="bookBtn" onclick="openDoctor()">Book</button>
</div>

</div>

<div class="card" onclick="goHistory()">
🤖 AI Symptom Checker<br>
<small>Instant health guidance</small>
</div>

<div class="card" onclick="goMedicine()">
💊 Order Medicines<br>
<small>Upload prescription & save money</small>
</div>

<div class="card" onclick="goHistory()">
📅 My Appointments<br>
<small>Track all consultations</small>
</div>

<div class="fab" onclick="callAmbulance()">🚑</div>

<div class="bottomNav">
<div onclick="goHome()">🏠</div>
<div onclick="goDoctors()">👨‍⚕️</div>
<div onclick="goMedicine()">💊</div>
<div onclick="goProfile()">👤</div>
</div>

<script>

function openDoctor(){
window.location.href="doctor-profile.html";
}

function goDoctors(){
window.location.href="doctors.html";
}

function goMedicine(){
window.location.href="medicine.html";
}

function goProfile(){
window.location.href="profile.html";
}

function goHistory(){
window.location.href="history.html";
}

function goHome(){
window.location.href="index.html";
}

function callAmbulance(){
window.location.href="tel:108";
}

</script>

</body>
</html>
