<!DOCTYPE html>
<html>
<head>
<title>Jeevantika</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1b5e20">

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:'Segoe UI';
background:#eef3f2;
}

/* Splash */

#splash{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(135deg,#1b5e20,#66bb6a);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
z-index:999;
}

/* Main */

.header{
background:linear-gradient(135deg,#1b5e20,#66bb6a);
color:white;
padding:22px;
font-size:24px;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
font-size:18px;
}

.nav{
position:fixed;
bottom:15px;
left:10px;
right:10px;
background:white;
display:flex;
justify-content:space-around;
padding:14px;
border-radius:30px;
box-shadow:0 12px 25px rgba(0,0,0,0.2);
font-size:22px;
}

.emergency{
position:fixed;
bottom:90px;
right:20px;
background:#e53935;
color:white;
padding:18px;
border-radius:50%;
font-size:22px;
}

</style>

</head>

<body>

<div id="splash">🌿 Jeevantika</div>

<div class="header">Jeevantika</div>

<div class="card" onclick="location.href='doctors.html'">
👨‍⚕ Find Doctors
</div>

<div class="card" onclick="location.href='history.html'">
📅 My Appointment
</div>

<div class="card" onclick="location.href='pharmacy.html'">
💊 Medicine Store
</div>

<div class="emergency" onclick="location.href='tel:108'">🚑</div>

<div class="nav">
<div>🏠</div>
<div onclick="location.href='doctors.html'">👨‍⚕</div>
<div onclick="location.href='pharmacy.html'">💊</div>
<div onclick="location.href='history.html'">📅</div>
</div>

<script>

/* Splash Delay */

setTimeout(()=>{
document.getElementById("splash").style.display="none";
},1500);

/* Service Worker */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
