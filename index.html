<!DOCTYPE html>
<html>
<head>
<title>Jeevantika</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f7f6;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* SEARCH */

.search{
margin:15px;
background:white;
padding:14px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* CATEGORY */

.cat-wrap{
display:flex;
overflow:auto;
padding-left:15px;
}

.cat{
background:white;
padding:10px 16px;
border-radius:25px;
margin-right:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
font-size:14px;
}

/* DOCTOR CARD */

.doc{
background:white;
margin:15px;
padding:15px;
border-radius:18px;
display:flex;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.doc img{
width:60px;
height:60px;
border-radius:50%;
margin-right:15px;
}

.doc-name{
font-weight:bold;
font-size:16px;
}

.doc-spec{
color:grey;
font-size:13px;
margin-top:4px;
}

.call-btn{
margin-left:auto;
background:#2e7d32;
color:white;
padding:10px 16px;
border:none;
border-radius:10px;
}

/* FLOATING EMERGENCY */

.emergency{
position:fixed;
bottom:90px;
right:20px;
background:#e53935;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:26px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* BOTTOM NAV */

.nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -5px 15px rgba(0,0,0,0.1);
}

.nav div{
text-align:center;
font-size:12px;
color:grey;
}

.active{
color:#2e7d32;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
🌿 Jeevantika
</div>

<div class="search">
🔍 Search doctors, medicines
</div>

<div class="cat-wrap">
<div class="cat">Cardio</div>
<div class="cat">Dental</div>
<div class="cat">Skin</div>
<div class="cat">General</div>
<div class="cat">Ortho</div>
</div>

<!-- DOCTOR -->

<div class="doc">
<img src="https://randomuser.me/api/portraits/men/32.jpg">
<div>
<div class="doc-name">Dr. Mehta</div>
<div class="doc-spec">Cardiologist • 12 yrs</div>
</div>
<button class="call-btn"
onclick="alert('Appointment Booked Successfully')">
Book
</button>
</div>

<div class="doc">
<img src="https://randomuser.me/api/portraits/women/44.jpg">
<div>
<div class="doc-name">Dr. Shah</div>
<div class="doc-spec">Dentist • 8 yrs</div>
</div>
<button class="call-btn"
onclick="alert('Appointment Booked Successfully')">
Book
</button>
</div>

<!-- FLOAT -->

<div class="emergency"
onclick="location.href='tel:108'">
🚑
</div>

<!-- NAV -->

<div class="nav">
<div class="active">🏠<br>Home</div>
<div>👨‍⚕️<br>Doctors</div>
<div>💊<br>Medicine</div>
<div>👤<br>Profile</div>
</div>

</body>
</html>
