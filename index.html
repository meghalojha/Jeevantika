<!DOCTYPE html>
<html>
<head>
<title>Jeevantika</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script type="module" src="firebase.js"></script>

<style>
body{font-family:Segoe UI;background:#f4f7f6;margin:0}
.header{background:#2e7d32;color:white;padding:20px;font-size:24px}
.card{background:white;margin:15px;padding:15px;border-radius:15px}
button{background:red;color:white;border:none;padding:12px;border-radius:12px}
</style>
</head>

<body>

<div class="header">🌿 Jeevantika</div>

<div class="card" onclick="location.href='doctors.html'">
Find Doctors
</div>

<div class="card" onclick="location.href='dashboard.html'">
My Dashboard
</div>

<div class="card" onclick="location.href='pharmacy.html'">
Medicine Store
</div>

<div class="card">
<button onclick="emergency()">Emergency Nearby</button>
</div>

<script>
function emergency(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

window.open(
`https://www.google.com/maps/search/hospital/@${lat},${lon},15z`
);

});

}
</script>

</body>
</html>
