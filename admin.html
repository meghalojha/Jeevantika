<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Admin</title>

<link rel="stylesheet" href="style.css">

<style>

.form{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
}

.list{
margin:20px;
}

.doc{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="header">Doctor Admin Panel</div>

<div class="form">

<input id="name" placeholder="Doctor Name">
<input id="spec" placeholder="Specialization">
<input id="exp" placeholder="Experience">
<button class="btn" onclick="addDoctor()">Add Doctor</button>

</div>

<div class="list" id="docList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBIEXLovtA6p7n0Qev6i4t7pnrGm1C9dsA",
authDomain:"jeevantika-f6972.firebaseapp.com",
projectId:"jeevantika-f6972",
storageBucket:"jeevantika-f6972.firebasestorage.app",
messagingSenderId:"61584268994",
appId:"1:61584268994:web:faf80613e68b3c0acce55b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function addDoctor(){

let name=document.getElementById("name").value;
let spec=document.getElementById("spec").value;
let exp=document.getElementById("exp").value;

if(!name||!spec||!exp){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"doctors"),{
name,
spec,
exp
});

alert("Doctor Added");
loadDoctors();

}

async function loadDoctors(){

let html="";
const querySnapshot = await getDocs(collection(db,"doctors"));

querySnapshot.forEach((doc)=>{
let d=doc.data();

html+=`
<div class="doc">
<b>${d.name}</b><br>
${d.spec} • ${d.exp} yrs
</div>
`;

});

document.getElementById("docList").innerHTML=html;

}

loadDoctors();

</script>

</body>
</html>👨‍⚕ ${d.name} <br>
${d.spec} ⭐${d.rating}
</div>
`;

});

}

loadDoctors();

</script>

</body>
</html>
