<!DOCTYPE html>
<html>
<head>
<title>Appointments</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Segoe UI;background:#f4f7f6}
.header{background:#2e7d32;color:white;padding:20px;text-align:center}
.card{background:white;margin:15px;padding:15px;border-radius:15px}
</style>
</head>

<body>

<div class="header">My Appointments</div>

<div id="box"></div>

<script>

let ap=JSON.parse(localStorage.getItem("appointment"));

if(ap){
box.innerHTML=`
<div class="card">
Doctor: ${ap.doctor}<br>
Time: ${ap.time}
</div>
`;
}else{
box.innerHTML="<div class='card'>No Appointment</div>";
}

</script>

</body>
</html>
