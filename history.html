<!DOCTYPE html>
<html>
<head>
<title>My Appointments</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Segoe UI;background:#f4f7f6}
.header{background:#2e7d32;color:white;padding:20px;text-align:center}
.card{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="header">My Appointments</div>

<div id="data"></div>

<script>

let appt=JSON.parse(localStorage.getItem("appointment"));

if(appt){

data.innerHTML=`
<div class="card">
Doctor: ${appt.doctor}<br>
Time: ${appt.time}
</div>
`;

}else{

data.innerHTML="<div class='card'>No Appointments</div>";

}

</script>

</body>
</html>
