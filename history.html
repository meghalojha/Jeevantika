<!DOCTYPE html>
<html>
<head>
<title>My Appointment</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f7f6}
.header{background:linear-gradient(135deg,#1b5e20,#66bb6a);color:white;padding:20px;text-align:center;font-size:22px}
.card{background:white;margin:20px;padding:25px;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,0.08)}
</style>

</head>

<body>

<div class="header">My Appointment</div>

<div class="card" id="data"></div>

<script>

let appt=JSON.parse(localStorage.getItem("appointment"));

if(appt){
data.innerHTML=
"Doctor: "+appt.doctor+
"<br>Date: "+appt.date+
"<br>Time: "+appt.time;
}
else{
data.innerHTML="No Appointment Booked";
}

</script>

</body>
</html>
