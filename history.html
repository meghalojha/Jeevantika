<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Appointment History</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f7f6;
margin:0;
}

.header{
background:linear-gradient(135deg,#2e7d32,#4caf50);
color:white;
padding:20px;
font-size:22px;
font-weight:600;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.doctor{
font-size:18px;
font-weight:600;
}

.info{
color:gray;
margin-top:5px;
}

.status{
margin-top:10px;
font-weight:600;
color:#2e7d32;
}

.empty{
text-align:center;
margin-top:50px;
color:gray;
}

</style>
</head>

<body>

<div class="header">
Appointment History
</div>

<div class="container" id="historyBox">

<div class="empty">Loading appointments...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_MSG_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const box = document.getElementById("historyBox");

async function loadAppointments(){

box.innerHTML="";

const querySnapshot = await getDocs(collection(db,"appointments"));

if(querySnapshot.empty){
box.innerHTML="<div class='empty'>No appointments yet</div>";
return;
}

querySnapshot.forEach(doc=>{

const data = doc.data();

box.innerHTML += `
<div class="card">
<div class="doctor">${data.doctor}</div>
<div class="info">📅 ${data.date}</div>
<div class="info">⏰ ${data.time}</div>
<div class="status">✅ ${data.status}</div>
</div>
`;

});

}

loadAppointments();

</script>

</body>
</html>
