<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings</title><style>
body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:15px;
}

.title{
font-weight:bold;
font-size:18px;
}

.meta{
color:gray;
margin-top:5px;
}
</style></head><body><h2>My Appointments</h2><div id="list"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const querySnapshot = await getDocs(collection(db,"appointments"));

querySnapshot.forEach(doc=>{

let data = doc.data();

document.getElementById("list").innerHTML += `
<div class="card">
<div class="title">${data.doctor}</div>
<div class="meta">Date: ${data.date}</div>
<div class="meta">Time: ${data.time}</div>
</div>
`;

});

</script></body>
</html>if(querySnapshot.empty){

</body>
</html>
