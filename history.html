<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment History</title>

<style>
body{
font-family: Arial;
background:#f4f7f6;
margin:0;
}

.header{
background:#2e7d32;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.doc{
font-size:18px;
font-weight:bold;
}

.time{
color:gray;
margin-top:5px;
}

.status{
margin-top:8px;
display:inline-block;
padding:5px 12px;
border-radius:20px;
background:#e8f5e9;
color:#2e7d32;
font-size:12px;
}

.empty{
text-align:center;
margin-top:100px;
color:gray;
}
</style>

</head>

<body>

<div class="header">
📅 My Appointments
</div>

<div class="container" id="list">
<div class="empty">Loading...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBIEXLovtA6p7n0Qev6i4t7pnrGm1C9dsA",
authDomain: "jeevantika-f6972.firebaseapp.com",
projectId: "jeevantika-f6972",
storageBucket: "jeevantika-f6972.firebasestorage.app",
messagingSenderId: "61584268994",
appId: "1:61584268994:web:faf80613e68b3c0acce55b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

async function loadAppointments(){

const querySnapshot = await getDocs(collection(db, "appointments"));
let html = "";

querySnapshot.forEach((doc)=>{

const data = doc.data();

html += `
<div class="card">
<div class="doc">👨‍⚕️ ${data.doctor}</div>
<div class="time">📅 ${data.date} • ⏰ ${data.time}</div>
<div class="status">✅ ${data.status}</div>
</div>
`;

});

if(html === ""){
document.getElementById("list").innerHTML =
'<div class="empty">No appointments yet</div>';
}else{
document.getElementById("list").innerHTML = html;
}

}

loadAppointments();

</script>

</body>
</html></div>

<div class="status confirmed">
Confirmed
</div>
</div>

<p style="margin-top:10px">
🕒 ${time}
</p>

<button class="btn" style="background:#e53935;margin-top:10px" onclick="cancel()">
Cancel Appointment
</button>

</div>

</div>

`;

}else{

document.getElementById("historyBox").innerHTML = `
<div class="empty">
<h3>No Appointments Yet</h3>
<p>Book your first consultation</p>
</div>
`;

}

function cancel(){
localStorage.removeItem("appointmentTime");
alert("Appointment Cancelled");
location.reload();
}

</script>

</body>
</html>
