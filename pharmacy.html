<!DOCTYPE html>
<html>
<head>
<title>Medicine Store</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script type="module" src="firebase.js"></script>

<style>
body{font-family:Segoe UI;background:#f4f7f6;margin:0;text-align:center}
.header{background:#2e7d32;color:white;padding:20px;font-size:22px}
.card{background:white;margin:15px;padding:15px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.08)}
button{background:#2e7d32;color:white;border:none;padding:10px 18px;border-radius:10px}
</style>
</head>

<body>

<div class="header">Medicine Store</div>

<div class="card">
Paracetamol ₹30  
<button onclick="order('Paracetamol')">Order</button>
</div>

<div class="card">
Vitamin C ₹120  
<button onclick="order('Vitamin C')">Order</button>
</div>

<script>
async function order(name){

await addDoc(collection(db,"orders"),{
medicine:name,
time:Date.now()
});

alert("Medicine Ordered");

}
</script>

</body>
</html>
