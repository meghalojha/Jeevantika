<!DOCTYPE html>
<html>
<head>
<title>Medicine Store</title>

<style>
body{font-family:Segoe UI;background:#f4f7f6;margin:0}
.header{background:#2e7d32;color:white;padding:20px;text-align:center}
.card{

padding:15px;

justify-content:space-between;
align-items:center;
}
.btn{
background:#2e7d32;
color:white;
padding:8px 14px;

}
</style>
</head>

<body>

<div class="header">Medicine Store</div>

<div class="card">
Paracetamol ₹30
<button class="btn" onclick="order('Paracetamol')">
Order
</button>
</div>

<div class="card">
Vitamin C ₹120
<button class="btn" onclick="order('Vitamin C')">
Order
</button>
</div>

<script>

function order(name){

alert(name+" Ordered Successfully");

}

</script>

</body>
</html>
