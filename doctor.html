<!DOCTYPE html>
<html>
<head>
<title>Doctor Profile</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f7f6}
.header{background:linear-gradient(135deg,#1b5e20,#66bb6a);color:white;padding:20px;text-align:center;font-size:22px}
.card{background:white;margin:20px;padding:25px;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,0.08);text-align:center}
button{padding:12px 20px;border:none;border-radius:10px;color:white;font-size:16px;margin-top:10px}
.call{background:#1565c0}
.book{background:#e53935}
</style>

</head>

<body>

<div class="header">Doctor Profile</div>

<div class="card">

<h2 id="name"></h2>

<p>Specialization: <span id="spec"></span></p>

<p>Experience: <span id="exp"></span></p>

<p>Rating: ⭐<span id="rating"></span></p>

<button class="call" id="callBtn">📞 Call</button>
<br>
<button class="book" onclick="window.location.href='appointment.html'">📅 Book</button>

</div>

<script>

let d=JSON.parse(localStorage.getItem("selectedDoctor"));

if(d){
name.innerText=d.name;
spec.innerText=d.spec;
exp.innerText=d.exp;
rating.innerText=d.rating;

callBtn.onclick=function(){
window.location.href="tel:"+d.phone;
}
}

</script>

</body>
</html>
