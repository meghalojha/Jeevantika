<!DOCTYPE html>
<html>
<head>
<title>Doctor Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f7f6;
}

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
}

.doc-img{
width:90px;
height:90px;
border-radius:50%;
margin-top:-60px;
border:5px solid white;
}

.book{
background:#2e7d32;
color:white;
padding:12px 20px;
border:none;
border-radius:12px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="header">Doctor Profile</div>

<div class="card">

<img class="doc-img"
src="https://randomuser.me/api/portraits/men/32.jpg">

<h3>Dr. Mehta</h3>
<p>Cardiologist • 12 Years Experience</p>
<p>⭐ 4.5 Rating</p>

<button class="book" onclick="book()">
Book Appointment
</button>

</div>

<script>

function book(){

let appt={
doctor:"Dr. Mehta",
time:new Date().toLocaleString()
};

localStorage.setItem("appointment",JSON.stringify(appt));

alert("Appointment Booked Successfully");

}

</script>

</body>
</html>
