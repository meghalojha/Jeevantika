<!DOCTYPE html>
<html>
<head>
<title>Doctor Detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Segoe UI;background:#f4f7f6;margin:0}

.header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

button{
background:#2e7d32;
color:white;
padding:12px 20px;
border:none;
border-radius:12px;
}

</style>
</head>

<body>

<div class="header">Doctor Profile</div>

<div class="card" id="doc"></div>

<script>

let name=localStorage.getItem("doctor");

let html="";

if(name=="mehta"){
html=`
<h2>Dr. Mehta</h2>
<p>Cardiologist • 12 yrs</p>
<button onclick="book('Dr. Mehta')">Book Appointment</button>
`;
}

if(name=="shah"){
html=`
<h2>Dr. Shah</h2>
<p>Dentist • 8 yrs</p>
<button onclick="book('Dr. Shah')">Book Appointment</button>
`;
}

doc.innerHTML=html;

function book(d){

let data={
doctor:d,
time:new Date().toLocaleString()
};

localStorage.setItem("appointment",JSON.stringify(data));

alert("Appointment Booked");

}

</script>

</body>
</html>
