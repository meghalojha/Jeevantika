<input id="otp" placeholder="Enter OTP">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

messagingSenderId:"61584268994",
appId:"1:61584268994:web:faf80613e68b3c0acce55b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha-container',{});

let confirmationResult;

window.sendOtp = function(){

let phone = document.getElementById("phone").value;

signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
.then(result=>{
confirmationResult = result;
alert("OTP Sent");
});

}

window.verifyOtp = function(){

let code = document.getElementById("otp").value;

confirmationResult.confirm(code)
.then(()=>{
alert("Login Success");
location.href="index.html";
});

}

</script>
