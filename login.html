<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#43a047,#2e7d32);
}

.card{
background:white;
padding:30px;
width:85%;
border-radius:25px;
box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

h2{
text-align:center;
margin-top:0;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

.btn{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:#2e7d32;
color:white;
font-size:16px;
font-weight:bold;
}

.otpbox{
display:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Login to Jeevantika</h2>

<div id="phoneBox">
<input id="phone" placeholder="Enter Phone Number">
<button class="btn" onclick="sendOtp()">Send OTP</button>
</div>

<div class="otpbox" id="otpBox">
<input id="otp" placeholder="Enter OTP">
<button class="btn" onclick="verifyOtp()">Verify & Login</button>
</div>

</div>

<script>

function sendOtp(){

let phone=document.getElementById("phone").value;

if(phone.length<8){
alert("Enter valid number");
return;
}

alert("OTP Sent (Demo: 1234)");

document.getElementById("phoneBox").style.display="none";
document.getElementById("otpBox").style.display="block";

}

function verifyOtp(){

let otp=document.getElementById("otp").value;

if(otp=="1234"){

localStorage.setItem("userLogged","yes");
alert("Login Successful");

location.href="index.html";

}else{
alert("Wrong OTP");
}

}

</script>

</body>
</html></div>

</script>

</body>
</html>
