<!DOCTYPE html><html>
<head>
<title>Doctors</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f7f6;
}

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
padding:22px;
font-size:24px;
font-weight:bold;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.search{
margin:15px;
padding:14px;
width:85%;
border-radius:12px;
border:none;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
font-size:16px;
}

.card{
background:white;
margin:15px;
padding:18px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
display:flex;
align-items:center;
}

.photo{
width:60px;
height:60px;
border-radius:50%;
background:#c8e6c9;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin-right:15px;
}

.info{
flex:1;
}

.name{
font-size:18px;
font-weight:bold;
}

.spec{
font-size:14px;
color:grey;
}

.rating{
color:#ff9800;
font-size:14px;
margin-top:4px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:8px 14px;
border-radius:10px;
}

</style></head><body><div class="header">Find Doctors</div><input class="search" type="text" placeholder="Search doctor..."><div class="card">
<div class="photo">👨‍⚕</div>
<div class="info">
<div class="name">Dr. Mehta</div>
<div class="spec">Cardiologist • 12 yrs exp</div>
<div class="rating">⭐⭐⭐⭐ 4.5</div>
</div>
<button onclick="window.location.href='tel:9876543210'">Call</button>
</div><div class="card">
<div class="photo">👩‍⚕</div>
<div class="info">
<div class="name">Dr. Shah</div>
<div class="spec">Dentist • 8 yrs exp</div>
<div class="rating">⭐⭐⭐⭐⭐ 4.8</div>
</div>
<button onclick="window.location.href='tel:9876501234'">Call</button>
</div></body>
</html>
