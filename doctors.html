<!DOCTYPE html>
<html>
<head>
<title>Doctors</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script type="module" src="firebase.js"></script>

<style>
body{font-family:Segoe UI;background:#f4f7f6;margin:0}
.header{background:#2e7d32;color:white;padding:20px;font-size:22px}
.card{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}
</style>
</head>

<body>

<div class="header">Doctors</div>

<div id="list"></div>

<script>

async function loadDoctors(){

let querySnapshot = await getDocs(collection(db,"doctors"));

querySnapshot.forEach((doc)=>{

let d=doc.data();

list.innerHTML += `
<div class="card">
👨‍⚕ ${d.name} <br>
${d.spec} ⭐${d.rating}
</div>
`;

});

}

loadDoctors();

</script>

</body>
</html>
