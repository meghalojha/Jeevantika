<input type="text" id="search" placeholder="Search doctor..."
onkeyup="searchDoctor()" style="width:90%;padding:12px;margin:15px;border-radius:8px;border:1px solid grey">

<div class="card doctor">Dr. Mehta (Cardiologist)</div>
<div class="card doctor">Dr. Shah (Dentist)</div><script>
function searchDoctor(){
let input = document.getElementById("search").value.toLowerCase();
let doctors = document.getElementsByClassName("doctor");

for(let i=0;i<doctors.length;i++){
let text = doctors[i].innerText.toLowerCase();
doctors[i].style.display = text.includes(input) ? "block" : "none";
}
}
</script>
