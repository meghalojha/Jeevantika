<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Profile</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}
.header {
  background: linear-gradient(90deg, #1b5e20, #43a047);
  color: white;
  padding: 20px;
  font-size: 22px;
}
.card {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
}
.slot {
  padding: 12px;
  border: 2px solid #2e7d32;
  border-radius: 12px;
  display: inline-block;
  margin: 6px;
  cursor: pointer;
}
.active {
  background: #2e7d32;
  color: white;
}
.bookbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
}
.btn {
  background: #2e7d32;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Dr Mehta</div>

<div class="card">
  <h2>Select Slot</h2>
  <div id="slots"></div>
</div>

<div class="bookbar">
  <div id="info">No slot selected</div>
  <button class="btn" onclick="bookNow()">Book Appointment</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyBIEXLovtA6p7n0Qev6i4t7pnrGm1C9dsA",
  authDomain: "jeevantika-6972.firebaseapp.com",
  projectId: "jeevantika-6972",
  storageBucket: "jeevantika-6972.appspot.com",
  messagingSenderId: "61584268994",
  appId: "1:61584268994:web:7c1dc303f82eeca9cce55b"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var selectedSlot = null;
var slotList = ["10:00 AM","10:30 AM","11:30 AM","12:00 PM","02:00 PM"];
var container = document.getElementById("slots");

// Generate the time slots
slotList.forEach(function(time){
  var div = document.createElement("div");
  div.innerHTML = time;
  div.className = "slot";

  div.onclick = function(){
    document.querySelectorAll(".slot").forEach(function(s){
      s.classList.remove("active");
    });
    
    div.classList.add("active");
    selectedSlot = time;
    document.getElementById("info").innerHTML = "Today • " + selectedSlot;
  };
  container.appendChild(div);
});

// Handle the booking button
function bookNow(){
  if(!selectedSlot){
    alert("Select a time slot first.");
    return;
  }

  // Update button UI so it doesn't freeze the screen
  var bookBtn = document.querySelector(".btn");
  bookBtn.innerHTML = "Booking...";
  bookBtn.disabled = true;
  bookBtn.style.opacity = "0.7";

  // Send to Firestore
  db.collection("appointments").add({
    doctor: "Dr Mehta",
    date: "Today",
    time: selectedSlot,
    status: "booked"
  })
  .then(function(doc){
    bookBtn.innerHTML = "Success!";
    // Redirect to history page
    window.location.href = "history.html";
  })
  .catch(function(error){
    bookBtn.innerHTML = "Book Appointment";
    bookBtn.disabled = false;
    bookBtn.style.opacity = "1";
    alert("Firestore Error: " + error.message);
  });
}
</script>

</body>
</html>
