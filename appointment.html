<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script type="module" src="firebase.js"></script>

<style>
body{font-family:Segoe UI;background:#f4f7f6;text-align:center}
.header{background:#2e7d32;color:white;padding:20px;font-size:22px}
input{
padding:12px;
margin:10px;
width:80%;
border-radius:10px;
border:1px solid #ccc;
}
button{
background:#2e7d32;
color:white;
border:none;
padding:12px 20px;
border-radius:12px;
}
</style>
</head>

<body>

<div class="header">Book Appointment</div>

<input id="name" placeholder="Your Name">
<input id="date" type="date">

<br>

<button onclick="book()">Confirm Booking</button>

<script>
async function book(){
let name=document.getElementById("name").value;
let date=document.getElementById("date").value;

await addDoc(collection(db,"appointments"),{
name:name,
date:date
});

alert("Appointment Booked Successfully");
}
</script>

</body>
</html>
