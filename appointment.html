<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBIEXLovtA6p7n0Qev6i4t7pnrGm1C9dsA",
authDomain: "jeevantika-f6972.firebaseapp.com",
projectId: "jeevantika-f6972",
storageBucket: "jeevantika-f6972.firebasestorage.app",
messagingSenderId: "61584268994",
appId: "1:61584268994:web:faf80613e68b3c0acce55b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.bookNow = async function(){

let doctor = document.getElementById("doctor").value;
let patient = document.getElementById("patient").value;
let time = document.getElementById("time").value;

if(!doctor || !patient || !time){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"appointments"),{
doctor: doctor,
patient: patient,
time: time,
date: new Date().toLocaleDateString()
});

alert("✅ Appointment Booked Successfully");

window.location.href="history.html";
}

</script>

</head>

<body style="font-family:sans-serif;padding:20px">

<h2>Book Appointment</h2>

<input id="doctor" placeholder="Doctor Name"><br><br>
<input id="patient" placeholder="Patient Name"><br><br>
<input id="time" placeholder="Time"><br><br>

<button onclick="bookNow()">Book Now</button>

</body>
</html>
