<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
button{
padding:10px;
margin:5px;
}
</style>

</head>

<body>

<h2>Dr Mehta</h2>

<h3>Select Slot</h3>

<button onclick="selectSlot('10:00 AM')">10:00 AM</button>
<button onclick="selectSlot('10:30 AM')">10:30 AM</button>
<button onclick="selectSlot('11:30 AM')">11:30 AM</button>

<br><br>

<button onclick="bookNow()">Book Appointment</button>

<script>

var firebaseConfig = {
apiKey: "PASTE YOUR API KEY",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

var selectedSlot = "";

function selectSlot(time){
selectedSlot = time;
alert("Selected " + time);
}

function bookNow(){

if(selectedSlot == ""){
alert("Select slot first");
return;
}

alert("Booking Started");

db.collection("appointments").add({
doctor:"Dr Mehta",
date:"Today",
time:selectedSlot,
status:"booked"
})
.then(function(){
alert("Booking Success");
})
.catch(function(error){
alert("Error → " + error.message);
});

}

</script>

</body>
</html>
