<!DOCTYPE html><html>
<head>
<title>Book Appointment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f7f6;
text-align:center;
}

.header{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
padding:22px;
font-size:24px;
}

.container{
padding:20px;
}

.slot{
background:white;
margin:12px;
padding:16px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
font-size:18px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:16px 25px;
border-radius:14px;
font-size:18px;
margin-top:20px;
}
</style></head><body><div class="header">Book Appointment</div><div class="container"><div class="slot">10:00 AM</div>
<div class="slot">11:30 AM</div>
<div class="slot">2:00 PM</div>
<div class="slot">4:30 PM</div><button onclick="book()">Confirm Booking</button>

</div><script>
function book(){
alert("Appointment Booked Successfully");
}
</script></body>
</html>
